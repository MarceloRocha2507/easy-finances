    <!-- Preconnect to critical origins for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://vcpnairzcpljyartrafm.supabase.co" crossorigin />
    <!-- Load fonts non-render-blocking via media="print" swap trick -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" media="print" onload="this.media='all'" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AppFinance - Gestão Financeira">
    <meta property="og:description" content="Gerencie suas finanças pessoais de forma simples e eficiente.">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AppFinance - Gestão Financeira">
    <meta name="twitter:description" content="Gerencie suas finanças pessoais de forma simples e eficiente.">
    <meta name="app-version" content="1.1.3_20260506_b" />
    <script>
      // Kill-switch agressivo: desregistra SWs antigos, limpa caches e
      // força reload uma única vez por sessão com cache-buster para
      // garantir que o navegador busque o bundle JS novo da rede.
      (function () {
        try {
          var APP_VERSION = "1.1.3_20260506_b";
          var storedVersion = localStorage.getItem("__app_v");

          function maybeReload(hadSW) {
            var versionChanged = storedVersion !== APP_VERSION;
            var alreadyForced = sessionStorage.getItem("__force_reload_v3") === "1";

            if ((hadSW || versionChanged) && !alreadyForced) {
              sessionStorage.setItem("__force_reload_v3", "1");
              localStorage.setItem("__app_v", APP_VERSION);
              var u = new URL(window.location.href);
              u.searchParams.set("__v", APP_VERSION + "_" + Date.now());
              window.location.replace(u.toString());
            } else {
              localStorage.setItem("__app_v", APP_VERSION);
            }
          }

          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadSW = regs.length > 0;
              Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
                if ("caches" in window) {
                  caches.keys().then(function (names) {
                    Promise.all(names.map(function (n) { return caches.delete(n); })).then(function () {
                      maybeReload(hadSW);
                    });
                  });
                } else {
                  maybeReload(hadSW);
                }
              });
            }).catch(function () { maybeReload(false); });
          } else {
            maybeReload(false);
          }
        } catch (e) {
          console.error("[kill-switch]", e);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
